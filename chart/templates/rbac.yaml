apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "offhours-guard.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "offhours-guard.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "offhours-guard.fullname" . }}-role
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["guard.3istor.com"]
    resources: ["offhoursschedules", "offhoursschedules/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "offhours-guard.fullname" . }}-rolebinding
subjects:
  - kind: ServiceAccount
    name: {{ include "offhours-guard.fullname" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "offhours-guard.fullname" . }}-role